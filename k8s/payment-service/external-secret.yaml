apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-service-es
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: payment-service-secret
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: prod/payment-service
        property: DATABASE_URL
    - secretKey: API_KEY
      remoteRef:
        key: prod/payment-service
        property: API_KEY
    - secretKey: DB_TEST
      remoteRef:
        key: prod/payment-service
        property: DB_TEST
